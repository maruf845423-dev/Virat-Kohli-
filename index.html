<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Virat Kohli Card</title>
    
    <style>
         *{
            margin:0px;
            padding:0px;
            box-sizing:border-box;
         }

        body{
            background-color:rgb(223, 21, 21);
            width:100vw;
            height:100vh;
            display: grid;
            place-content: center;
        }
        div{
            background-color:black;
            width:400px;
            border-radius:20px;
            text-align:center;
        }
        img{
            width:400px;
            height: 400px;
            border-top-left-radius:20px;
            border-top-right-radius:20px;
        }
        a{
            font-size: 40px;   
            background-color:greenyellow;
            display:black;
            margin:10px;
            padding:5px;
            border-radius:20px;
            text-decoration:none;
        }

    </style>
</head>
<body>
    <div>

        <img src="chitraa.png" alt="virat kohli picture">

        <a href="https://instagram.com/virat.kohli">@virat kohli</a>
    </div>
</body>
</html>
